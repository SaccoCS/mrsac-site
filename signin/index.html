<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="google-signin-client_id" content="128059190930-7407tnnv05i1b720a2fhesr7s9m46j3o">
  <script src="https://apis.google.com/js/platform.js" async defer></script>
  <title>Sacco Sign-in</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <script src="script.js"></script>
  <script src="https://apis.google.com/js/platform.js?onload=onLoadCallback" async defer></script>
<script>
    
    
    window.onLoadCallback = function(){
      var out = document.getElementById("button");
    console.log(out);
   // out.style.visibility = "hidden";
    
    
    var auth2 = gapi.auth2.getAuthInstance();
      console.log(auth2.currentUser.get());
      var sIn;
      console.log(sIn = auth2.isSignedIn.get());
      if(sIn){
        hideLoginButton();
      }
      else {
        showLoginButton();
      }
   // console.log(auth2.isSignedIn().get());
      
    }
    
    
    
    function showLoginButton(){
        console.log("showing")
      document.getElementById("out").style.display="none";
      document.getElementById("button").style.display="inline-block";
    }
    
    function hideLoginButton(){
        console.log("Hiding")
       document.getElementById("out").style.display="inline-block";
      document.getElementById("button").style.display="none";
    }
    
    function onSignIn(googleUser) {
     // var id = document.getElementById("button");
     // console.log(id);
      // Useful data for your client-side scripts:
      var profile = googleUser.getBasicProfile();
      console.log("ID: " + profile.getId()); // Don't send this directly to your server!
      console.log('Full Name: ' + profile.getName());
      console.log('Given Name: ' + profile.getGivenName());
      console.log('Family Name: ' + profile.getFamilyName());
      console.log("Image URL: " + profile.getImageUrl());
      console.log("Email: " + profile.getEmail());

      // The ID token you need to pass to your backend:
      var id_token = googleUser.getAuthResponse().id_token;
      console.log("ID Token: " + id_token);
      
      var auth2 = gapi.auth2.getAuthInstance();
      console.log(auth2.isSignedIn.get());
      
    //  document.getElementById("button").style.display="none";
   //  var out =  document.getElementById("out");
     // out.style.display="inline-block";
   //   console.log(out);
      hideLoginButton();
      
      out.innerHTML = "You are currently logged in as:<br>" + profile.getEmail() +"<br>Logout?"
    }
    
    function signIn(){
      var auth2 = gapi.auth2.getAuthInstance();
      auth2.signIn().then(onSignIn(auth2.currentUser.get()));
      
    }

    function signOut() {
      var auth2 = gapi.auth2.getAuthInstance();
      
      auth2.signOut().then(function() {
        console.log('User signed out.');
        showLoginButton();
      });
    }
  </script>
  <div id = "button" style = "display:none">
    
  <div class="g-signin2" data-onsuccess="onSignIn"></div>
  
  </div>
  <a  href="#" id = "out" onclick="signOut();"  style = "display:none">Sign out</a>
  
  
  
</body>

</html>
